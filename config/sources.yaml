# ─────────────────────────────────────────────────────────────────────────────
# news-graphrag / config/sources.yaml
# 新聞來源總覽設定
#
# 分層架構:
#   Layer 1 - Free RSS     → feedparser 每 30 分鐘爬一次
#   Layer 2 - Web Scrape   → Playwright 每 2 小時
#   Layer 3 - Struct API   → 結構化 API / JSON (高品質)
#   Layer 4 - Premium/PDF  → 人工上傳 or Email 解析
#
# 欄位說明:
#   id          唯一識別碼
#   name        顯示名稱
#   url         主頁 URL
#   feed        RSS/Atom 端點（Layer 1）
#   layer       1-4
#   language    zh / en / bilingual
#   domains     對應 Domain Enum（see models.py）
#   priority    1(最高)–5(最低)，影響爬取頻率與 embedding 優先級
#   update_freq  預計更新頻率（分鐘）
#   paywall     true = 有訂閱牆
#   notes       備註
# ─────────────────────────────────────────────────────────────────────────────

metadata:
  version: "1.0"
  created: "2026-03-02"
  total_sources: 42
  auto_crawl_count: 28   # Layer 1+2+3
  premium_count: 14      # Layer 4

