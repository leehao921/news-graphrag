version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# News GraphRAG + n8n 自動化整合棧
# Mac Mini M4 單機部署（Apple Silicon）
#
# 服務清單:
#   核心數據:  qdrant | neo4j | postgres | redis
#   LLM:       ollama
#   自動化:    n8n          ← 新增：工作流程引擎
#   儲存:      minio        ← 新增：S3 相容物件儲存 (PDF 報告)
#   應用:      api | scheduler
#
# 快速啟動:
#   docker compose up -d                    # 全部啟動
#   docker compose up -d qdrant neo4j postgres redis n8n  # 不含 Ollama
#   open http://localhost:5678              # n8n 管理介面
#   open http://localhost:9001             # MinIO 控制台
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════
  # 核心數據層
  # ══════════════════════════════════════════════════════

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: graphrag_qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    container_name: graphrag_neo4j
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1'"]
      interval: 15s; timeout: 10s; retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: graphrag_postgres
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsdb}
      POSTGRES_USER: ${POSTGRES_USER:-newsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser}"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: graphrag_redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  # 本機 LLM（Apple Silicon Metal 加速）
  # ══════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: graphrag_ollama
    ports: ["11434:11434"]
    volumes: [ollama_models:/root/.ollama]
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_NUM_PARALLEL: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/"]
      interval: 15s; timeout: 10s; retries: 5
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  # n8n 工作流程自動化引擎
  # ══════════════════════════════════════════════════════

  n8n:
    image: n8nio/n8n:latest
    container_name: graphrag_n8n
    ports: ["5678:5678"]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows-import:ro  # 匯入預設工作流
      - n8n_files:/files                                       # 報告暫存
    environment:
      # n8n 基礎設定
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: Asia/Taipei
      N8N_LOG_LEVEL: info

      # 後端資料庫（使用 Postgres 而非預設 SQLite）
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-newsuser}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

      # 連線外部服務
      # 這些變數在 n8n workflow 中透過 credentials 使用
      GRAPHRAG_API_URL: http://api:8000     # FastAPI 後端
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}

      # Email 通知（可選）
      # N8N_SMTP_HOST: smtp.gmail.com
      # N8N_SMTP_PORT: 465
      # N8N_SMTP_USER: your@gmail.com
      # N8N_SMTP_PASS: app-password

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - graphrag_net
    restart: unless-stopped
    # 首次啟動後，在瀏覽器開啟 http://localhost:5678 建立帳號
    # 然後 import workflows from ./n8n/workflows/*.json

  # ══════════════════════════════════════════════════════
  # MinIO — S3 相容物件儲存（報告 PDF、原始資料備份）
  # ══════════════════════════════════════════════════════

  minio:
    image: minio/minio:latest
    container_name: graphrag_minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes: [minio_data:/data]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 10s; timeout: 5s; retries: 5
    networks:
      - graphrag_net
    restart: unless-stopped

  # MinIO 初始化（建立 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: graphrag_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - graphrag_net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/reports;
        mc mb --ignore-existing local/raw-articles;
        mc mb --ignore-existing local/embeddings-backup;
        mc anonymous set download local/reports;
        echo 'MinIO buckets initialized';
      "

  # ══════════════════════════════════════════════════════
  # FastAPI 應用層（n8n 呼叫的 Python 後端）
  # ══════════════════════════════════════════════════════

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag_api
    ports: ["8000:8000"]
    volumes:
      - ./src:/app/src:ro
      - ./report/templates:/app/templates:ro
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-newsuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-newsdb}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - graphrag_net
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  # Embedding Bridge — OpenAI 相容開源 Embedding API
  # 供 OpenClaw memory_search 使用（port 11235）
  # 同時供 GraphRAG 文章入庫使用（統一語義空間）
  # ══════════════════════════════════════════════════════

  embed-bridge:
    build:
      context: .
      dockerfile: Dockerfile.embed   # 精簡鏡像，僅 sentence-transformers
    container_name: graphrag_embed_bridge
    ports: ["11235:11235"]           # OpenClaw 透過 host:11235 存取
    volumes:
      - ./src/embeddings:/app/src/embeddings:ro
      - embed_models:/app/models     # HuggingFace 模型快取
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-m3}
      EMBED_MAX_BATCH: 32
      EMBED_CACHE_TTL: 86400
      REDIS_URL: redis://redis:6379/1   # DB 1（隔離 embedding cache）
      QDRANT_URL: http://qdrant:6333
      # 首次啟動會自動下載模型（~1.1GB for BGE-M3）
      HF_HOME: /app/models
      TRANSFORMERS_CACHE: /app/models
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - graphrag_net
    command: >
      uvicorn src.embeddings.bridge:app
      --host 0.0.0.0 --port 11235
      --workers 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11235/health"]
      interval: 30s; timeout: 10s; retries: 5
    restart: unless-stopped
    # OpenClaw 設定 (openclaw.json):
    #   memory.provider = openai
    #   memory.remote.baseUrl = http://localhost:11235/v1
    #   memory.remote.apiKey = local-bridge
    #   memory.model = BAAI/bge-m3

  # ══════════════════════════════════════════════════════
  # SiYuan 思源筆記 — 知識庫 / 報告文件管理
  # ══════════════════════════════════════════════════════

  siyuan:
    image: b3log/siyuan:latest
    container_name: graphrag_siyuan
    ports: ["6806:6806"]          # Web UI + REST API
    volumes:
      - siyuan_workspace:/siyuan/workspace
      - ./siyuan/notebooks:/siyuan/workspace/data:rw  # 持久化筆記本
    command:
      - "--workspace=/siyuan/workspace/"
      - "--accessAuthCode=${SIYUAN_TOKEN:-graphrag2026}"
    environment:
      TZ: Asia/Taipei
      PUID: 1000
      PGID: 1000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6806/api/system/version || exit 1"]
      interval: 15s; timeout: 10s; retries: 5
    networks:
      - graphrag_net
    restart: unless-stopped
    # 首次啟動後:
    #   1. 開啟 http://localhost:6806
    #   2. 輸入 Access Auth Code: graphrag2026（或 .env 設定值）
    #   3. 執行初始化: python src/knowledge/siyuan_client.py --init
    #   4. 將 Notebook ID 填入 .env SIYUAN_NOTEBOOK_GRAPHRAG=xxx

  # ══════════════════════════════════════════════════════
  # DolphinScheduler（可選 — 替代 n8n 用於複雜 DAG）
  # ══════════════════════════════════════════════════════
  # 預設不啟動；若需要取消下方 profiles 限制
  # docker compose --profile dolphin up -d

  dolphin-standalone:
    image: apache/dolphinscheduler-standalone-server:latest
    container_name: graphrag_dolphin
    profiles: ["dolphin"]   # 預設不啟動
    ports:
      - "12345:12345"  # Web UI
      - "25333:25333"  # API
    volumes:
      - dolphin_data:/opt/dolphinscheduler
      - ./dolphinscheduler:/opt/dolphinscheduler/conf/custom:ro
    environment:
      TZ: Asia/Taipei
      DATABASE_TYPE: postgresql
      DATABASE_DRIVER: org.postgresql.Driver
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-newsuser}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DATABASE_DATABASE: dolphin_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - graphrag_net
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  postgres_data:
  redis_data:
  ollama_models:
  n8n_data:
  n8n_files:
  minio_data:
  siyuan_workspace:
  dolphin_data:
  embed_models:         # Embedding Bridge 模型快取（BGE-M3 ~1.1GB）

networks:
  graphrag_net:
    name: graphrag_network
    driver: bridge
